name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this PR for bugs, security issues, and consistency problems.
            Focus on: SQL injection, unhandled errors, missing edge cases, type mismatches, and unhandled promise rejections.
            Be concise — only report real issues, not style nits.
